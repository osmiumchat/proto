syntax = "proto3";

package tangle.client.discovery;
import "types.proto";


// discovery.getDiscoverableCommunities -> discovery.DiscoveryCommunities
message GetDiscoverableCommunities {
  // pagination
  optional fixed64 after = 1;
  uint32 limit = 2;

  // add more filters here later (e.g. categories, language, etc)
}

message DiscoveryCommunities {
  repeated DiscoveryCommunityListing listings = 1;
}

// short description, longer description, categories from user input, icon, name, and identifier
message DiscoveryCommunityListing {
  // @snowflake<Community>
  fixed64 community_id = 1;
  string name = 2;
  types.ChatPhoto photo = 3;
  string invite_code = 4;
  string short_description = 5;
  string long_description = 6;
  repeated string categories = 7;
}

message DiscoveryListingInfo {
  // string name = 1;
  reserved 1;
  string short_description = 2;
  string long_description = 3;
  repeated string categories = 4;
}