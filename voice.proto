syntax = "proto3";

import "refs.proto";

package tangle.client.voice;

message RoomInfo {
  // @snowflake
  fixed64 room_id = 1;
  refs.ChatRef chat_ref = 2;
  string endpoint = 3;
  string token = 4;
}

message RoomParticipant {
  // @snowflake
  fixed64 room_id = 1;
  string session_id = 2;
  // @snowflake<User>
  fixed64 user_id = 3;
  bool muted = 4;
  bool deafened = 5;
  bool video_available = 7;
  bool screen_available = 8;
}

// voice.requestRoom -> RoomInfo
message RequestRoom {
  refs.ChatRef chat_ref = 1;
}

// Updates
message UpdateRoomState {
  refs.ChatRef chat_ref = 1;
  RoomState state = 2;
}

message RoomState {
  // @snowflake
  fixed64 room_id = 2;
  repeated RoomParticipant participants = 3;
}

message UpdateRoomParticipant {
  refs.ChatRef chat_ref = 1;
  RoomParticipant participant = 2;
}
