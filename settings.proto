syntax = "proto3";

package tangle.client.settings;

import "media.proto";
import "refs.proto";
import "types.proto";

// settings.editProfilePhoto -> ()
message EditProfilePhoto { optional media.UploadedFileRef file = 1; }

// settings.registerPushSubscription -> ()
message RegisterPushSubscription {
  enum PushType {
    UNKNOWN = 0;
    WEB = 1;
    IOS = 2;
    ANDROID_FCM = 3;
  }
  enum PushEncryptionScheme {
    PUSH_ENCRYPTION_UNKNOWN = 0;
    P256_HKDF_SHA256_AES256GCM_V1 = 1;
  }
  message WebPush {
    string endpoint = 1;
    string p256dh = 2;
    string auth = 3;
  }
  message Push {
    PushType type = 1;
    string token = 2;
    optional string encryption_public_key = 3;
    optional string encryption_auth_secret = 4;
    optional string encryption_key_id = 5;
    PushEncryptionScheme encryption_scheme = 6;
  }

  oneof subscription {
    WebPush web = 1;
    Push push = 2;
  }
}

// settings.unregisterPushSubscription -> ()
message UnregisterPushSubscription {}

// settings.changeNotificationPreferences -> ()
message ChangeNotificationPreferences { 
  types.NotifPrefs prefs = 1;
  
  oneof scope {
    refs.ChatRef chat_ref = 2; // For channel or DM chat
    // @snowflake<Community>
    fixed64 community_id = 3; // For community-level default
  }
}

// settings.editProfile -> ()
message EditProfile {
  optional string name = 1;
  optional string username = 2;
  optional string bio = 3;
  // @snowflake<Emoji>
  optional fixed64 icon = 4;
  optional uint32 color = 5;
}

// settings.getAccount -> settings.Account
message GetAccount {}

message Account {
  optional string email = 1;
  bool confirmed = 2;
  bool has_password = 3;
  bool totp_enabled = 4;
  bool pending_delete = 5;
}

// settings.changePassword -> ()
message ChangePassword {
  string current_password = 1;
  string new_password = 2;
  bool revoke_sessions = 3; // Revoke all other sessions after password change
}

// settings.changeEmail -> ()
message ChangeEmail {
  string new_email = 1;
}

// settings.changeStatus -> ()
message ChangeStatus {
  tangle.client.types.UserStatus.Status status = 2;
  repeated tangle.client.types.UserStatus.Activity activities = 3;
}

// settings.setupTotp -> settings.Totp
message SetupTotp {
  bool enabled = 1;
  optional string code = 2;
}

message Totp {
  bool enabled = 1;
  optional string url = 2;
  repeated BackupCode backup_codes = 3;
}

message BackupCode {
  string code = 1;
  bool used = 2;
}

// settings.requestTakeout -> ()
message RequestTakeout {}

// settings.deleteAccount -> ()
message DeleteAccount {
  optional bool cancel = 1;
}
