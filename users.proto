syntax = "proto3";

package osmium.client.users;

import "refs.proto";
import "types.proto";

// users.getProfile -> Profile
message GetProfile {
  refs.UserRef ref = 1;    
}

message Profile {
  refs.UserRef ref = 1;
  string bio = 2;
  optional fixed64 premium_since = 3;
  optional types.ChatPhoto banner = 4;
}

// users.lookupUsername -> UserDetails
message LookupUsername { string username = 1; }
message UserDetails { types.User user = 1; }
