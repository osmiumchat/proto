syntax = "proto3";

package tangle.client.auth;
import "types.proto";

// auth.signIn -> auth.Authorization
message SignIn {
  string email = 1;
  string password = 2;
  optional string totp = 3;
}

// auth.signUp -> auth.Authorization
message SignUp {
  optional string email = 1;
  optional string password = 2;
  string name = 3;
}

// auth.authorize -> auth.Authorization
message Authorize { string token = 5; }

message Authorization {
  string token = 1;
  tangle.client.types.User user = 2;
  // @snowflake<Session>
  fixed64 session_id = 3;
}

// auth.getSessions -> auth.Sessions
message GetSessions {}

message Sessions {
  repeated Session sessions = 1;
  // @snowflake<Session>
  fixed64 current = 2;
}

message Session {
  // @snowflake<Session>
  fixed64 id = 1;
  uint32 client_id = 2;
  string device_type = 3;
  string device_version = 4;
  string app_name = 5;
  string app_version = 6;
  fixed64 last_active = 7;
  optional string country = 8;
  optional string region = 9;
}

// auth.revokeSessions -> ()
message RevokeSessions {
  // @snowflake<Session>
  repeated fixed64 session_ids = 1;
}

// auth.resetPassword -> ()
message ResetPassword {
  message ResetPasswordConfirm {
    string code = 1;
    string new_password = 2;
  }

  string email = 1;
  optional ResetPasswordConfirm confirm = 2;
}

// auth.verifyEmail -> ()
message VerifyEmail {
  string email = 1;
  string code = 2;
}

// auth.resendEmailVerification -> ()
message ResendEmailVerification { optional string email = 1; }

// auth.LookupInvite -> auth.InvitePreview
message LookupInvite { string code = 1; }

// response model for invite creates, for all community/chat/user
message CreatedInvite { string code = 1; }

enum InviteType {
  UNKNOWN = 0;
  COMMUNITY = 1;
  GROUP = 2;
  USER = 3;
}

message InvitePreview {
  string code = 1;
  // @snowflake<User>
  fixed64 creator_id = 2;
  // @snowflake<Keyable>
  fixed64 target_id = 3;
  InviteType target_type = 4;
  optional fixed64 expires_at = 5;

  optional tangle.client.types.User creator = 6;

  oneof target_info {
    tangle.client.types.Community community = 7;
    tangle.client.types.Group chat = 8;
    tangle.client.types.User user = 9;
  }
}

// auth.UseInvite -> ()
message UseInvite { string code = 1; }

message InviteList {
  repeated InvitePreview invites = 1;
}