syntax = "proto3";

package osmium.client.billing;

// billing.requestPaymentLink -> billing.PaymentLink
message RequestPaymentLink {
  string redirect_url = 1;
  string plan = 2;
  string billing_period = 3; // monthly or yearly
}

message PaymentLink {
  optional string url = 1;
}

// billing.getProducts -> billing.Products
message GetProducts {}

message Products {
  repeated Product products = 1;
}

message Product {
  string plan = 1;
  string name = 2;
  repeated ProductPrice prices = 3;
}

message ProductPrice {
  string billing_period = 1; // monthly, yearly, or lifetime
  uint64 amount_minor = 2;
  string currency = 3;
}

// billing.cancelSubscription -> billing.CancelSubscription
message CancelSubscription {}

// billing.getSubscription -> billing.Subscription
message GetSubscription {}

message Subscription {
  bool active = 1;
  optional fixed64 since = 2;
  optional uint64 next_renewal_date = 3;
  optional string last_card_digits = 4;
  optional string method = 5; // e.g. directdebit, paypal
  optional uint64 end_date = 6;
}
