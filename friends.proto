syntax = "proto3";

package tangle.client.friends;
import "types.proto";

// friends.getFriends -> Friends
message GetFriends {}
message Friends { repeated types.User friends = 1; }

// friends.syncFriends -> ()
message SyncFriends {
  fixed64 id = 1;
  string name = 2;
  string platform = 3;
  repeated bytes friend_ids_hashed = 4;
}

// friends.lookupUsername -> UserDetails
message LookupUsername { string username = 1; }
message UserDetails {
  types.User user = 1;
}